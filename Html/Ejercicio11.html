<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ej 11</title>
</head>
<body>
    <script>
        const km= +prompt(`Ingrese la cantidad de Kilometros recorridos:`);
        const Litros= +prompt(`Ingrese la cantidad de litros consumidos:`);
        const consumo = km/Litros;
        document.write(`El consumo de combustible es: ${consumo.toFixed(2)} km/litro`);
    </script>
</body>
</html>
