<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ej 13</title>
</head>
<body>
    <script>
        const cant = parseInt(prompt(`Ingrese la cantidad de numeros que desea ingresar:`));
        let numeros = [];
        for(let i=1; i<=cant; i++){
            numeros.push(+prompt(`Ingrese el numero ${i}:`));
        }
        document.write(`Los numeros que ingreso son:`);
        for(let i=0; i<numeros.length; i++){
            document.write(`<br>`);
            document.write(`Numero nro ${i+1}: ${numeros[i]}`);
        }
    </script>
</body>
</html>
